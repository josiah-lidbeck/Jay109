<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Insect Game</title>
        <link rel="stylesheet" href="style/insect.css">
    </head>

    <body>
        <div class="screen">
            <h1>Catch The Insect</h1>
            <button class="btn" id="start-btn">Play Game</button>
        </div>
        <div class="screen">
            <h1>What is your favorite insect?</h1>
            <ul class = "insects-list">
                <li>
                    <button class="choose-insect-btn">
                        <p>Fly</p>
                        <img src="images/Fly.jfif" alt="Fly">
                    </button>
                </li>
                <li>
                    <button class="choose-insect-btn">
                        <p>Grasshopper</p>
                        <img src="images/grasshopper.jfif" alt="Grasshopper">
                    </button>
                </li>

                 <li>
                    <button class="choose-insect-btn">
                        <p>Ladybug</p>
                        <img src="images/ladybug.webp" alt="Ladybug">
                    </button>
                </li>
                 <li>
                    <button class="choose-insect-btn">
                        <p>Caterpillar</p>
                        <img src="images/caterpillar.jfif" alt="Caterpillar">
                    </button>
                </li>
            </ul>
        </div>
<div class="screen game-container" id="game-container">
    <h3 id="time" class="time">Time: 00:00</h3>
    <h3 id="score" class="score">Score: 0</h3>
        <h5 id="message" class="message">
            Are you annoyed yet? <br>
            You are playing an impossible game!
        </h5>
</div>



        <script src="script/insect.js"></script>
    </body>

</html>
